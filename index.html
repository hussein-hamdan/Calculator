<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <title>Calculator</title>
  </head>

  <body>
    <div class="calculator" id="calc">
      <div class="display">
        <div id="previous-operand"></div>
        <div id="current-operand">0</div>
      </div>

      <div class="buttons-grid">
        <button onclick="toggleScientific()" class="span-two mode-btn">
          Scientific
        </button>
        <div class="scientific-keys">
          <button onclick="scientificCommand('pow2')">x²</button>
          <button onclick="chooseOperation('**')">xʸ</button>
          <button onclick="scientificCommand('sin')">sin</button>
          <button onclick="scientificCommand('cos')">cos</button>
          <button onclick="scientificCommand('tan')">tan</button>
          <button onclick="scientificCommand('sqrt')">√</button>
          <button onclick="scientificCommand('log10')">10ˣ</button>
          <button onclick="scientificCommand('log')">log</button>
          <button onclick="scientificCommand('exp')">Exp</button>
          <button onclick="chooseOperation('%')">Mod</button>
          <button onclick="scientificCommand('pi')">π</button>
          <button onclick="scientificCommand('fact')">n!</button>
          <button onclick="appendNumber('(')">(</button>
          <button onclick="appendNumber(')')">)</button>
        </div>
        <button class="btn-gray" onclick="clearDisplay()">CE</button>
        <button class="btn-gray" onclick="allClear()">C</button>
        <button class="btn-gray" onclick="deleteNumber()">⌫</button>
        <button class="btn-op" onclick="chooseOperation('÷')">÷</button>

        <button class="btn-num" onclick="appendNumber('7')">7</button>
        <button class="btn-num" onclick="appendNumber('8')">8</button>
        <button class="btn-num" onclick="appendNumber('9')">9</button>
        <button class="btn-op" onclick="chooseOperation('×')">×</button>

        <button class="btn-num" onclick="appendNumber('4')">4</button>
        <button class="btn-num" onclick="appendNumber('5')">5</button>
        <button class="btn-num" onclick="appendNumber('6')">6</button>
        <button class="btn-op" onclick="chooseOperation('-')">-</button>

        <button class="btn-num" onclick="appendNumber('1')">1</button>
        <button class="btn-num" onclick="appendNumber('2')">2</button>
        <button class="btn-num" onclick="appendNumber('3')">3</button>
        <button class="btn-op" onclick="chooseOperation('+')">+</button>

        <button class="btn-num" onclick="toggleSign()">±</button>
        <button class="btn-num" onclick="appendNumber('0')">0</button>
        <button class="btn-num" onclick="appendNumber('.')">.</button>
        <button class="btn-equals" onclick="compute()">=</button>
      </div>
    </div>
    <script src="./js/main.js"></script>
  </body>
</html>
