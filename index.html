<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <title>Calculator</title>
  </head>

  <body>
    <div class="calculator" id="calc">
      <button class="toggle" onclick="toggleMode()">Scientific Mode</button>

      <div class="display">0</div>

      <div class="buttons">
        <!-- Scientific -->
        <button class="scientific">sin</button>
        <button class="scientific">cos</button>
        <button class="scientific">tan</button>
        <button class="scientific">log</button>
        <button class="scientific">ln</button>
        <button class="scientific">π</button>

        <button class="scientific">x²</button>
        <button class="scientific">x³</button>
        <button class="scientific">√</button>
        <button class="scientific">∛</button>
        <button class="scientific">xʸ</button>
        <button class="scientific">( )</button>

        <!-- Standard -->
        <button>%</button>
        <button>CE</button>
        <button>C</button>
        <button>⌫</button>
        <button class="operator">÷</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">×</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">−</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">+</button>

        <button>±</button>
        <button>0</button>
        <button>.</button>
        <button class="equal">=</button>
      </div>
    </div>

    <script src="./js/main.js"></script>
  </body>
</html>
